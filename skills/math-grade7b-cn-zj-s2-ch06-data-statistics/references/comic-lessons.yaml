comic_lessons:
  - id: data-detective-bureau-chart-wall
    title: "The Chart Wall Case"
    world: "数据侦探局"
    characters: ["Cathy", "GoGo", "Detective Data"]
    beat:
      hook: "The bureau receives a folder of category counts with no display."
      intuition: "Cathy asks whether the goal is comparison, change, or part-whole."
      rule: "Choose a chart based on what the data needs to show."
      guided_example: "Lunch option counts fit a bar chart because they compare categories."
      common_trap: "GoGo chooses a line chart even though there is no time order."
      student_check: "Ask which chart fits monthly reading minutes."
      recap: "Purpose decides chart type."
      next_mission: "Use the frequency scanner to inspect survey results."
    implementation_note: "Use the scene to connect chart choice with the data question."
