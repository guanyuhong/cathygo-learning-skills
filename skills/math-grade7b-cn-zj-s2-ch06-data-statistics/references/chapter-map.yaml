chapter:
  id: ch06-data-statistics
  title: "数据与统计图表"
  skill: math-grade7b-cn-zj-s2-ch06-data-statistics
  scope_note: "Chapter map for routing and coverage tracking."
subsections:
  - id: "6.1"
    title: "数据的收集与整理"
    focus: "Collect data for a clear question and organize it in tables."
  - id: "6.2"
    title: "条形统计图和折线统计图"
    focus: "Use bar charts for category comparison and line charts for change over order or time."
  - id: "6.3"
    title: "扇形统计图"
    focus: "Use pie charts to show part-whole relationships."
  - id: "6.4"
    title: "频数与频率"
    focus: "Count frequency and compare by relative frequency."
  - id: "6.5"
    title: "频数直方图"
    focus: "Group numerical data and show frequencies with a histogram."
