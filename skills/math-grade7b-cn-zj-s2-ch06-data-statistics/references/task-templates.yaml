task_templates:
  - id: chart-choice
    level: C
    prompt_shape: "Give a data goal and ask which chart type fits best."
  - id: frequency-table
    level: B
    prompt_shape: "Give a short original data list and ask for frequencies."
  - id: chart-interpretation
    level: B
    prompt_shape: "Describe a simple chart in words and ask for one supported conclusion."
  - id: data-plan-critique
    level: A_plus
    prompt_shape: "Ask the learner to improve a data collection plan for fairness and clarity."
