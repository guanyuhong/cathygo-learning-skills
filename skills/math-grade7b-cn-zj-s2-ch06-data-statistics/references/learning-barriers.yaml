barriers:
  - id: wrong-chart-choice
    signal: "Learner chooses a pie chart to show changes over time."
    likely_cause: "The learner remembers chart names but not what each chart communicates."
    diagnostic_question: "Are you comparing parts of a whole or showing change across order?"
    intervention: "Use a chart-purpose decision cue."
    follow_up_check: "Ask which chart fits weekly temperature changes."
  - id: frequency-rate-confusion
    signal: "Learner treats frequency and relative frequency as the same number."
    likely_cause: "The learner does not connect relative frequency to the total."
    diagnostic_question: "What is the count, and what is the total count?"
    intervention: "Have the learner write count / total before simplifying or converting."
    follow_up_check: "Ask for relative frequency when 6 out of 30 learners choose an option."
