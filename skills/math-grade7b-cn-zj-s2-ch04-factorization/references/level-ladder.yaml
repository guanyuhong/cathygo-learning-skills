levels:
  C:
    goal: "Recognize factorization as product form and spot simple common factors."
    task_style: "Choose whether an expression is factored or expanded."
    feedback_style: "Contrast sum form and product form."
    typical_assessment_types: ["identify product form", "find a common factor"]
  B:
    goal: "Extract common factors and use routine formula patterns."
    task_style: "Standard factorization with clear factors."
    feedback_style: "Ask the learner to verify by expansion."
    typical_assessment_types: ["factor by common factor", "factor by formula"]
  A:
    goal: "Choose between common factor and formula strategies."
    task_style: "Mixed method selection."
    feedback_style: "Prompt for method order: common factor first, formula second."
    typical_assessment_types: ["mixed factorization", "explain method choice"]
  A_plus:
    goal: "Handle layered or transformed factorization tasks."
    task_style: "Multi-step expressions with structure recognition."
    feedback_style: "Ask for a structure scan before performing algebra."
    typical_assessment_types: ["challenge factorization", "reverse-design expression"]
