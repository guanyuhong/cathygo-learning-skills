task_templates:
  - id: product-form-recognition
    level: C
    prompt_shape: "Ask whether a given expression is in factored product form."
  - id: common-factor-extract
    level: B
    prompt_shape: "Give two or three terms with a shared numerical and variable factor."
  - id: formula-factor
    level: B
    prompt_shape: "Give a clean difference-of-squares or perfect-square pattern."
  - id: mixed-method
    level: A
    prompt_shape: "Give an expression where the learner should extract a common factor before checking formulas."
