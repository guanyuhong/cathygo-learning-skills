barriers:
  - id: confuses-expand-and-factor
    signal: "Learner expands when asked to factor."
    likely_cause: "The learner recognizes the formula but uses it in the wrong direction."
    diagnostic_question: "Should the final answer be a sum or a product?"
    intervention: "Ask the learner to label the target form before starting."
    follow_up_check: "Show two forms and ask which one is factored."
  - id: misses-common-factor
    signal: "Learner jumps to formula use while every term has a shared factor."
    likely_cause: "The learner searches for a memorized pattern before scanning terms."
    diagnostic_question: "What factor is present in every term?"
    intervention: "Use a first-pass common-factor scan."
    follow_up_check: "Ask for the common factor in 6x + 9."
