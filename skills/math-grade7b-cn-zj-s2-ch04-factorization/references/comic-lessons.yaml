comic_lessons:
  - id: factorization-workshop-common-factor-magnet
    title: "The Common-Factor Magnet"
    world: "因式拆装工坊"
    characters: ["Cathy", "GoGo", "Mechanic Fen"]
    beat:
      hook: "A workshop machine refuses to disassemble an expression until shared parts are found."
      intuition: "Cathy sees that every term carries a 3-part."
      rule: "A common factor can be placed outside parentheses."
      guided_example: "Use the magnet to factor 6x + 9."
      common_trap: "GoGo grabs only the first term's factor and misses the second term."
      student_check: "Ask what factor appears in both terms."
      recap: "Scan all terms before choosing the tool."
      next_mission: "Try the formula mold for square patterns."
    implementation_note: "Use the scene to reinforce scanning all terms before choosing a method."
