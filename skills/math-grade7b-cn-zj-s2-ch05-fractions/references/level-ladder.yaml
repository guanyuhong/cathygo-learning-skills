levels:
  C:
    goal: "Recognize algebraic fractions and forbidden denominator values."
    task_style: "Find restrictions in simple denominators."
    feedback_style: "Set the denominator equal to zero as a guided step."
    typical_assessment_types: ["restriction check", "meaning check"]
  B:
    goal: "Perform routine fraction simplification and operations."
    task_style: "Factor, simplify, multiply, divide, or use common denominators."
    feedback_style: "Ask the learner to state restrictions before simplifying."
    typical_assessment_types: ["simplify", "operate with common denominator"]
  A:
    goal: "Solve fraction equations and explain rejected values."
    task_style: "Multi-step fraction equations and mixed operations."
    feedback_style: "Require checking against original denominators."
    typical_assessment_types: ["solve and check", "explain extraneous value"]
  A_plus:
    goal: "Handle connected fraction tasks with strategy and restriction awareness."
    task_style: "Challenge expressions and equation design."
    feedback_style: "Prompt for a restriction map before calculation."
    typical_assessment_types: ["strategy task", "create an expression with a given restriction"]
