comic_lessons:
  - id: fraction-city-denominator-gate
    title: "Restriction Map in Fraction City"
    world: "分式城"
    characters: ["Cathy", "GoGo", "Variable Courier X"]
    beat:
      hook: "Variable Courier X reaches a gate that locks when the denominator becomes zero."
      intuition: "Cathy checks the gate rule before sending the courier through."
      rule: "Values that make denominators zero are not allowed."
      guided_example: "For 8 / (x - 5), solve x - 5 = 0 to find the closed gate."
      common_trap: "GoGo simplifies first and forgets the original gate."
      student_check: "Ask for the forbidden value in 4 / (y + 3)."
      recap: "Restrictions come before operations."
      next_mission: "Use common-denominator roads for addition."
    implementation_note: "Use the scene to make denominator restrictions visible before operations."
