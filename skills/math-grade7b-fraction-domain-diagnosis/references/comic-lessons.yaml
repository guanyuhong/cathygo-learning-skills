skill_name: math-grade7b-fraction-domain-diagnosis
comic_lessons:
  - id: variable-courier-checkpoint
    title: Variable Courier X at the Checkpoint
    characters:
      - "Variable Courier X"
      - "Checkpoint Zero"
    scene: "Courier X must pass through several denominator checkpoints before delivering a fraction parcel."
    learning_goal: "Check every original denominator factor for zero."
    beats:
      - panel: 1
        action: "Courier X sees two checkpoints labeled k - 4 and k + 2."
        dialogue: "Courier X: I need to know which values block the route."
      - panel: 2
        action: "Checkpoint Zero tests k = 4 and k = -2."
        dialogue: "Checkpoint Zero: Either checkpoint turning zero closes the route."
      - panel: 3
        action: "Courier X writes both forbidden values on the delivery map."
        dialogue: "Courier X: I check the original map before simplifying."
    clean_room_note: "Original CathyGO comic lesson; no copied images or textbook scenes."
  - id: disappearing-factor-map
    title: The Disappearing Factor Map
    characters:
      - "Map Maker Lin"
      - "Variable Courier X"
    scene: "A factor fades after simplification, but its closed road remains marked on the original map."
    learning_goal: "A canceled denominator factor can still create an original restriction."
    beats:
      - panel: 1
        action: "Map Maker Lin circles a factor that appears in the original denominator."
        dialogue: "Map Maker Lin: Mark the closed road before cleaning the map."
      - panel: 2
        action: "The factor fades from the simplified expression."
        dialogue: "Courier X: It disappeared. Is the old closure gone?"
      - panel: 3
        action: "The original map keeps the warning sign."
        dialogue: "Map Maker Lin: The simplified route remembers where the original route broke."
    clean_room_note: "Original metaphor and script."
