skill_name: math-grade7b-fraction-domain-diagnosis
assessment_items:
  - id: item-single-denominator
    clean_room_origin: original
    target: single denominator restriction
    difficulty: easy
    prompt: "Find the forbidden value for 6 / (s + 8)."
    expected_answer: "s = -8."
    feedback_guidance: "Ask the learner to solve s + 8 = 0 if they are unsure."
  - id: item-product-denominator
    clean_room_origin: original
    target: multiple denominator factors
    difficulty: medium
    prompt: "Find all forbidden values for 3 / ((k - 4)(k + 2))."
    expected_answer: "k = 4 and k = -2."
    feedback_guidance: "Credit both values; if one is missing, ask them to test each factor."
  - id: item-canceled-factor
    clean_room_origin: original
    target: original expression restriction
    difficulty: medium
    prompt: "For (u + 3) / ((u + 3)(u - 1)), list all forbidden values before simplifying."
    expected_answer: "u = -3 and u = 1."
    feedback_guidance: "Emphasize that restrictions come from the original denominator."
