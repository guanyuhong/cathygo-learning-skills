skill_name: math-grade7b-fraction-domain-diagnosis
allowed_memory:
  - "Learner needs reminders to check the original denominator before simplifying."
  - "Learner can solve single-factor restrictions but misses product denominators."
  - "Learner benefits from writing denominator equals zero as a separate step."
disallowed_memory:
  - "Private identity information."
  - "Exact copied homework or textbook prompts."
  - "Permanent claims that the learner is weak at algebra."
update_rules:
  - "Keep only short learning-support notes."
  - "Remove or revise a misconception note after the learner succeeds twice in a row."
  - "Do not store publisher-specific material."
