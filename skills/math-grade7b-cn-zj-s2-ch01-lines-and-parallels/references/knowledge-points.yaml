knowledge_points:
  - subsection: "1.1"
    points:
      - id: vertical-angles
        statement: "When two lines intersect, opposite angles formed by the crossing are equal."
      - id: adjacent-linear-pair
        statement: "Adjacent angles on a straight line have measures that add to 180 degrees."
  - subsection: "1.2"
    points:
      - id: angle-pair-position
        statement: "Angle-pair names depend on their positions around two lines and a transversal."
  - subsection: "1.3"
    points:
      - id: parallel-meaning
        statement: "Parallel lines in the same plane do not meet."
  - subsection: "1.4"
    points:
      - id: parallel-criterion
        statement: "Certain equal angle pairs can be used as evidence that two lines are parallel."
  - subsection: "1.5"
    points:
      - id: parallel-property
        statement: "If two lines are parallel, related angle pairs have predictable equal or supplementary measures."
  - subsection: "1.6"
    points:
      - id: translation
        statement: "A translation moves every point the same distance in the same direction."
