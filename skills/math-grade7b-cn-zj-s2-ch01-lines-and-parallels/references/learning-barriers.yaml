barriers:
  - id: confuses-angle-pair-names
    signal: "Learner names corresponding angles as alternate interior angles."
    likely_cause: "The learner focuses on equal-looking angles instead of relative position."
    diagnostic_question: "Are the two angles on the same side of the transversal or opposite sides?"
    intervention: "Ask the learner to trace the transversal first, then decide inside/outside and same/opposite side."
    follow_up_check: "Give a fresh diagram description and ask only for the angle-pair name."
  - id: reverses-criterion-and-property
    signal: "Learner uses 'parallel lines have equal corresponding angles' to prove parallelism without stating the known angle equality."
    likely_cause: "The learner memorized rules but not their direction."
    diagnostic_question: "Are we proving the lines are parallel, or using parallel lines to prove angles?"
    intervention: "Use a two-column cue: evidence on the left, conclusion on the right."
    follow_up_check: "Ask the learner to classify a statement as criterion or property."
