levels:
  C:
    goal: "Recognize variables, solutions, and simple system meaning."
    task_style: "Check whether an ordered pair satisfies an equation."
    feedback_style: "Guide substitution one value at a time."
    typical_assessment_types: ["solution check", "variable meaning"]
  B:
    goal: "Solve routine two-variable systems accurately."
    task_style: "Substitution or elimination with clear arithmetic."
    feedback_style: "Name the first incorrect algebra step."
    typical_assessment_types: ["solve a system", "check in both equations"]
  A:
    goal: "Choose methods and model simple contexts."
    task_style: "Method selection and original word-problem modeling."
    feedback_style: "Ask why the chosen method is efficient."
    typical_assessment_types: ["method comparison", "model and solve"]
  A_plus:
    goal: "Handle connected or extended systems with strategic elimination."
    task_style: "Three-variable reductions and parameter-like reasoning."
    feedback_style: "Prompt for a plan before calculation."
    typical_assessment_types: ["challenge system", "strategy explanation"]
