task_templates:
  - id: pair-check
    level: C
    prompt_shape: "Give one ordered pair and ask whether it satisfies two simple equations."
  - id: solve-routine
    level: B
    prompt_shape: "Give a two-equation system designed for substitution or elimination."
  - id: model-original-context
    level: A
