comic_bible:
  design_note: "Shared CathyGO comic worlds for intuition-first math tutoring."
  shared_characters:
    - name: "Cathy"
      role: "Learner guide who asks clear questions and checks reasoning."
    - name: "GoGo"
      role: "Small mission companion who marks traps and next missions."
    - name: "Tutor Lin"
      role: "Calm tutor voice who turns intuition into rules."
  required_beat:
    - hook
    - intuition
    - rule
    - guided_example
    - common_trap
    - student_check
    - recap
    - next_mission
  chapter_worlds:
    - chapter: 1
      title: "几何侦探街"
      world_id: geometry-detective-street
      core_scene: "A street of angle clues, parallel tracks, and sliding shapes where learners solve geometry cases."
      recurring_props:
        - "Angle clue cards"
        - "Parallel track tape"
        - "Translation scooter"
    - chapter: 2
      title: "方程双城"
      world_id: equation-twin-cities
      core_scene: "Two connected cities exchange number packages until both city gates agree on the same solution."
      recurring_props:
        - "Balance bridge"
        - "Variable passport"
        - "Elimination tunnel"
    - chapter: 3
      title: "整式能量工厂"
      world_id: polynomial-energy-factory
      core_scene: "A factory turns powers, monomials, and polynomials into clean energy blocks."
      recurring_props:
        - "Exponent counter"
        - "Term conveyor"
        - "Formula switchboard"
    - chapter: 4
      title: "因式拆装工坊"
      world_id: factorization-workshop
      core_scene: "A workshop disassembles expressions into reusable factor parts."
      recurring_props:
        - "Common-factor magnet"
        - "Formula mold"
        - "Assembly table"
    - chapter: 5
      title: "分式城"
      world_id: fraction-city
      core_scene: "A city of denominator gates, common-denominator roads, and equation checkpoints."
      recurring_props:
        - "Denominator gate"
        - "Restriction map"
        - "Fraction courier bag"
    - chapter: 6
      title: "数据侦探局"
      world_id: data-detective-bureau
      core_scene: "A detective bureau collects data clues and turns them into readable chart reports."
      recurring_props:
        - "Survey notebook"
        - "Chart wall"
        - "Frequency scanner"
