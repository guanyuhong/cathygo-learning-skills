profiles:
  middle_to_stable_B:
    default_level: B
    remediation_level: C
    stretch_level: A
    feedback_preference: "Frequent short checks, one correction at a time, and concrete worked steps when stuck."
    practice_policy: "Use a C-level prerequisite check before B-level practice; add A-level stretch only after two stable successes."
  middle_to_A:
    default_level: B
    remediation_level: C
    stretch_level: A
    feedback_preference: "Ask the learner to explain choices, then give precise feedback on method and notation."
    practice_policy: "Start with one routine B item, move to A mixed practice, and finish with a reflection prompt."
  top_to_A_plus:
    default_level: A
    remediation_level: B
    stretch_level: A_plus
    feedback_preference: "Use lean feedback, challenge assumptions, and ask for concise justification."
    practice_policy: "Use A tasks as warm-up, then A_plus extensions that connect methods or expose edge cases."
