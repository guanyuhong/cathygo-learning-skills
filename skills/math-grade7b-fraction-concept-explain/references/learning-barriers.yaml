skill_name: math-grade7b-fraction-concept-explain
barriers:
  - id: ignores-zero-denominator
    signal: "The learner substitutes a value without checking whether the denominator becomes zero."
    likely_cause: "The learner treats variables like ordinary placeholders and forgets division restrictions."
    diagnostic_question: "For 7 / (y - 2), which value of y is not allowed?"
    intervention: "Use the phrase 'the denominator door closes at zero' and ask the learner to solve the denominator equals zero."
    follow_up_check: "Ask the learner to list the forbidden value before simplifying a new expression."
  - id: cancels-terms-not-factors
    signal: "The learner cancels x from x + 3 over x + 5."
    likely_cause: "The learner sees matching symbols but does not distinguish factors from terms."
    diagnostic_question: "Is x multiplying the whole top and whole bottom, or is it part of an addition?"
    intervention: "Have the learner circle complete factors before any cancellation."
    follow_up_check: "Ask whether (x + 3) / (x + 5) can cancel x and why."
  - id: common-denominator-confusion
    signal: "The learner adds denominators directly."
    likely_cause: "The learner transfers whole-number addition rules to fractions."
    diagnostic_question: "When adding 1 / x and 1 / 2x, what denominator could both fractions share?"
    intervention: "Use a shared tray analogy: both fractions must be placed on the same-sized tray before combining."
    follow_up_check: "Ask the learner to rewrite both fractions with denominator 2x."
