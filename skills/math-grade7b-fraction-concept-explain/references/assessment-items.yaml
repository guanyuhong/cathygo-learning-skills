skill_name: math-grade7b-fraction-concept-explain
assessment_items:
  - id: item-denominator-restriction-1
    clean_room_origin: original
    target: denominator restriction
    difficulty: easy
    prompt: "For 9 / (m - 6), which value of m is not allowed?"
    expected_answer: "m = 6 is not allowed because it makes the denominator zero."
    feedback_guidance: "If the learner misses it, ask them to set the denominator m - 6 equal to zero."
  - id: item-factor-cancel-1
    clean_room_origin: original
    target: simplifying by common factor
    difficulty: medium
    prompt: "Simplify 4p / 12p and state the restriction on p."
    expected_answer: "1 / 3, with p not equal to 0."
    feedback_guidance: "Credit both the simplification and the restriction."
  - id: item-no-term-cancel-1
    clean_room_origin: original
    target: invalid cancellation
    difficulty: medium
    prompt: "Can (r + 2) / (r + 7) be simplified by canceling r? Explain briefly."
    expected_answer: "No. r is part of sums, not a common factor multiplying the whole numerator and denominator."
    feedback_guidance: "Ask the learner to identify complete factors before canceling."
