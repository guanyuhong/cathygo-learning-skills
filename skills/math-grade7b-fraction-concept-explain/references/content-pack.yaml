skill_name: math-grade7b-fraction-concept-explain
subject: mathematics
grade_band: Grade 7B
topic: algebraic fractions
clean_room_origin: "Original CathyGO-authored learning content using standard math facts."
learning_goals:
  - "Recognize an algebraic fraction as a fraction whose numerator or denominator may contain letters."
  - "State that any denominator must not equal zero."
  - "Simplify algebraic fractions by canceling common factors, not separate terms."
  - "Use common denominators for addition and subtraction."
prerequisites:
  - "Understand ordinary fractions."
  - "Recognize variables and simple factors."
  - "Know that division by zero is not defined."
concepts:
  - id: algebraic-fraction
    name: Algebraic fraction
    explanation: "An algebraic fraction works like a numerical fraction, but letters can stand for changing numbers. The denominator still controls which values are allowed."
    original_examples:
      - "In (x + 2) / (x - 3), the value x = 3 is not allowed because it makes the denominator zero."
  - id: denominator-restriction
    name: Denominator restriction
    explanation: "Before simplifying or substituting values, check which variable values would make the denominator zero and keep those values out."
    original_examples:
      - "For 5 / (a + 4), a cannot be -4."
  - id: simplify-by-factor
    name: Simplify by common factor
    explanation: "Cancel a shared factor that multiplies the whole numerator and the whole denominator. Do not cancel pieces that are only connected by plus or minus signs."
    original_examples:
      - "2x / 6x can simplify to 1 / 3 when x is not 0."
  - id: common-denominator
    name: Common denominator
    explanation: "To add or subtract algebraic fractions, rewrite them so their denominators match, then combine the numerators."
    original_examples:
      - "1 / x + 2 / (3x) can use 3x as a common denominator when x is not 0."
out_of_scope:
  - "Publisher textbook exercise reproduction."
  - "Formal rational expression proofs beyond Grade 7B scope."
  - "Non-algebraic fraction units unless needed as prerequisite review."
