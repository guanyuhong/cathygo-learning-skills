name: Validate CathyGO Learning Skills

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: List marketplace
        run: python tools/cathygo.py list

      - name: Validate marketplace
        run: python tools/cathygo.py validate

      - name: Eval marketplace
        run: python tools/cathygo.py eval
